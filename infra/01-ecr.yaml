AWSTemplateFormatVersion: "2010-09-09"
Description: "Byte Bot — ECR repository"

Parameters:
  ProjectName:
    Type: String
    Default: byte-bot

Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ProjectName
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 5 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": {"type": "expire"}
              }
            ]
          }

Outputs:
  ECRRepositoryUri:
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub "${ProjectName}-ECRUri"

  ECRRepositoryName:
    Value: !Ref ECRRepository
    Export:
      Name: !Sub "${ProjectName}-ECRName"
