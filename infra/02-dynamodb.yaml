AWSTemplateFormatVersion: "2010-09-09"
Description: "Byte Bot — DynamoDB single-table"

Parameters:
  ProjectName:
    Type: String
    Default: byte-bot
  TableName:
    Type: String
    Default: ByteBot

Resources:
  BotTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  TableName:
    Value: !Ref BotTable
    Export:
      Name: !Sub "${ProjectName}-TableName"

  TableArn:
    Value: !GetAtt BotTable.Arn
    Export:
      Name: !Sub "${ProjectName}-TableArn"
